<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .container{
            background-color: black;
            display: flex;
            flex-direction: column;
        }

        .filho{
            background-color: lightblue;
            text-align: center;
            padding: 10px;
            border: 1px solid black;
        }

        #a{ background-color: rgb(255, 0, 0);}

        #b{background-color: rgb(255, 60, 60);}

        #c{background-color: rgb(253, 80, 80);}

        #d{background-color: rgb(255, 90, 90);}
         
        #e{background-color: rgb(255, 110, 110);}
    </style>
    <title>Aula sobre flexbox</title>
</head>
<body>
    <div class="container">
        <div class="filho" id="a">Exemplo de bloco A</div>
        <div class="filho" id="b">Exemplo de bloco B</div>
        <div class="filho" id="c">Exemplo de bloco C</div>
        <div class="filho" id="d">Exemplo de bloco D</div>
        <div class="filho" id="e">Exemplo de bloco E</div>
    </div>
    
</body>
</html>
