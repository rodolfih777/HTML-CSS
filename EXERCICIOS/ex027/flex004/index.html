<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .container{
            background-color: black;

            height: 300px;
            align-items: center;

            display: flex;
            flex-flow: row nowrap;
            justify-content:space-evenly;
        }

        .filho{
            background-color: lightblue;
            border: 1px solid black;
            text-align: center;
        }

        #a{ background-color: rgb(255, 0, 0);}

        #b{background-color: rgb(255, 60, 60);}

        #c{background-color: rgb(253, 80, 80);}

        #d{background-color: rgb(255, 90, 90);}
         
        #e{background-color: rgb(255, 110, 110);}
    </style>
    <title>Aula sobre flexbox</title>
</head>
<body>
    <div class="container">
        <div class="filho" id="a">A</div>
        <div class="filho" id="b">B</div>
        <div class="filho" id="c">C</div>
        <div class="filho" id="d">D</div>
        <div class="filho" id="e">E</div>
    </div>
    
</body>
</html>
