<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .container {
            background-color: black;
            display: flex;
            flex-flow: row nowrap;


            /* (exemplo da quebra )*/
            /*(Exemplo para telas menores tipo celular) flex-flow: row wrap;*/

        }

        .filho {
            background-color: lightblue;
            text-align: center;
            border: 1px solid black;

            flex-basis: 250px;
            flex-shrink: 1;
            flex-grow: 1;
        }

        div#a {
            /*flex-shrink: 0;
            flex-grow: 1;
            flex-basis: 200px;*/
            flex: 1 0 200px;
        }

        div#b {
            /*flex-shrink: 1;
            flex-grow: 1;
            flex-basis: 150px;*/
            flex: 1 1 150px;
        }

        div#b {
            /*flex-shrink: 8;
            flex-grow: 1;
            flex-basis:auto;*/
            flex: 1 8 auto;
        }

        #a {
            background-color: rgb(255, 0, 0);
        }

        #b {
            background-color: rgb(255, 60, 60);
        }

        #c {
            background-color: rgb(253, 80, 80);
        }

        #d {
            background-color: rgb(255, 90, 90);
        }

        #e {
            background-color: rgb(255, 110, 110);
        }
    </style>
    <title>Aula sobre flexbox</title>
</head>

<body>
    <div class="container">
        <div class="filho" id="a">A </div>
        <div class="filho" id="b">B </div>
        <div class="filho" id="c">C </div>
    </div>

</body>

</html>
